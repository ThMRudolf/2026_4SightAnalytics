name: Deploy to Hostinger via SCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "./"
          target: ${{ secrets.REMOTE_PATH }}
          rm: true  # Delete files not in repo
      
      - name: Deployment Success
        if: success()
        run: echo "✅ Website deployed to Hostinger successfully!"
      
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check secrets and path."